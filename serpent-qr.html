<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SERPENT QR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  body {
    margin:0; background:#020810; color:#00ff9f;
    font-family:'Share Tech Mono',monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:20px; padding:20px;
    background-image: linear-gradient(rgba(0,255,159,0.04) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(0,255,159,0.04) 1px,transparent 1px);
    background-size: 40px 40px;
  }
  h1 { font-family:'Orbitron',sans-serif; font-size:clamp(20px,6vw,28px); letter-spacing:6px;
        text-shadow:0 0 8px #00ff9f,0 0 20px #00ff9f55; text-align:center; }
  .qr-box {
    padding:16px; border:1px solid rgba(0,255,159,0.4);
    box-shadow:0 0 24px rgba(0,255,159,0.2);
    position:relative; background:#020810;
  }
  .qr-box::before,.qr-box::after {
    content:''; position:absolute; width:14px; height:14px;
    border-color:#00ff9f; border-style:solid;
  }
  .qr-box::before { top:-1px;left:-1px;border-width:2px 0 0 2px; }
  .qr-box::after  { bottom:-1px;right:-1px;border-width:0 2px 2px 0; }
  canvas { display:block; }
  .sub { font-size:11px; letter-spacing:3px; opacity:.6; text-align:center; }
  .url-input {
    background:transparent; border:1px solid rgba(0,255,159,0.3);
    color:#ffe600; font-family:'Share Tech Mono',monospace;
    font-size:12px; padding:10px 14px; width:100%; max-width:340px;
    outline:none; letter-spacing:1px;
  }
  .url-input:focus { border-color:#00ff9f; box-shadow:0 0 8px rgba(0,255,159,0.3); }
  .btn {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:11px;
    letter-spacing:4px; padding:10px 28px;
    background:transparent; border:1px solid #00ff9f; color:#00ff9f;
    cursor:pointer; text-shadow:0 0 8px #00ff9f;
    box-shadow:0 0 8px rgba(0,255,159,0.3); transition:all .2s;
  }
  .btn:hover { background:#00ff9f; color:#020810; text-shadow:none; }
  .steps {
    font-size:11px; letter-spacing:1px; opacity:.7;
    max-width:340px; line-height:2;
    border:1px solid rgba(0,255,159,0.15); padding:16px; width:100%;
  }
  .steps b { color:#ffe600; }
  label { font-size:10px; letter-spacing:3px; opacity:.5; }
</style>
</head>
<body>
<h1>SERPENT // QR</h1>

<div class="qr-box">
  <canvas id="qr" width="220" height="220"></canvas>
</div>
<div class="sub">ESCANEA PARA JUGAR</div>

<label>INGRESA TU URL PUBLICADA:</label>
<input class="url-input" id="url-in" type="text" placeholder="https://tu-usuario.github.io/serpent/" />
<button class="btn" onclick="generateQR()">GENERAR QR</button>

<div class="steps">
  <b>CÓMO PUBLICAR EL JUEGO:</b><br>
  1. Ve a <b>github.com</b> → New repository<br>
  2. Sube el archivo <b>snake-game.html</b><br>
  &nbsp;&nbsp;&nbsp;renómbralo a <b>index.html</b><br>
  3. Settings → Pages → Branch: main<br>
  4. Copia la URL que te da GitHub<br>
  5. Pégala arriba y genera el QR<br>
  6. ¡Imprime y comparte! 🐍
</div>

<script>
// Minimal QR Code generator (pure JS, no deps)
// Based on nayuki's QR code library logic - simplified version
function generateQR() {
  const url = document.getElementById('url-in').value.trim() || 'https://tu-usuario.github.io/serpent/';
  const canvas = document.getElementById('qr');
  const size = 220;
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Use Google Charts API to generate QR (works when online)
  // For offline fallback we draw a placeholder pattern
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.clearRect(0,0,size,size);
    ctx.drawImage(img, 0, 0, size, size);
    // Color the QR neon green
    const imgData = ctx.getImageData(0,0,size,size);
    const d = imgData.data;
    for (let i=0;i<d.length;i+=4) {
      if (d[i]<50) { // dark pixels
        d[i]=0; d[i+1]=255; d[i+2]=159; // neon green
      } else {
        d[i]=2; d[i+1]=8; d[i+2]=16; // dark bg
      }
    }
    ctx.putImageData(imgData, 0,0);
  };
  img.onerror = () => {
    // Offline fallback: draw placeholder
    ctx.fillStyle = '#020810';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#00ff9f';
    ctx.font = '10px monospace';
    ctx.fillText('Conecta internet', 10, size/2-10);
    ctx.fillText('para generar QR', 10, size/2+10);
  };
  const encoded = encodeURIComponent(url);
  img.src = `https://chart.googleapis.com/chart?chs=220x220&cht=qr&chl=${encoded}&choe=UTF-8`;
}

// Auto-generate on load
window.onload = generateQR;
</script>
</body>
</html>
